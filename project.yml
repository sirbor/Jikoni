name: Jikoni
options:
  bundleIdPrefix: com.sirbor.jikoni
targets:
  Jikoni:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Jikoni
    info:
      path: Jikoni/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: "LaunchScreenBackground"
          UIImageName: "AppIcon"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - armv7
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sirbor.jikoni
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ENABLE_PREVIEWS: YES
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
